services:
  # Keep staging and production service contracts aligned.
  - &health_hub_service
    type: web
    name: health-hub-staging
    runtime: node
    plan: starter
    branch: health-hub-test
    buildCommand: npm ci && npm run typecheck && npm run build
    preDeployCommand: npm run db:init && npm run verify:prelive
    startCommand: node --dns-result-order=ipv4first dist/health-hub/server/server.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22.12.0"
      - key: CANONICAL_REDIRECT_SOURCE_HOST
        value: healthhubinternational.com
      - key: CANONICAL_REDIRECT_TARGET_HOST
        value: www.healthhubinternational.com
      - key: DATABASE_URL
        fromDatabase:
          name: health-hub-staging-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: DAILY_API_KEY
        sync: false
      - key: DAILY_FALLBACK_ROOM
        value: https://healthhub.daily.co/demo
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: meditron:7b

  - <<: *health_hub_service
    name: health-hub
    branch: main
    domains:
      - www.healthhubinternational.com
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22.12.0"
      - key: CANONICAL_REDIRECT_SOURCE_HOST
        value: healthhubinternational.com
      - key: CANONICAL_REDIRECT_TARGET_HOST
        value: www.healthhubinternational.com
      - key: DATABASE_URL
        fromDatabase:
          name: health-hub-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: DAILY_API_KEY
        sync: false
      - key: DAILY_FALLBACK_ROOM
        value: https://healthhub.daily.co/demo
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: meditron:7b

databases:
  - name: health-hub-staging-db
    plan: starter
    databaseName: healthhub_staging
    postgresMajorVersion: "16"
  - name: health-hub-db
    plan: starter
    databaseName: healthhub
    postgresMajorVersion: "16"
