<section class="notifications-page">
  <header class="page-header">
    <button class="back-btn" (click)="goBack()" aria-label="Go back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7" />
      </svg>
    </button>
    <h1>Notifications</h1>
    <button class="mark-all-btn" *ngIf="unreadCount > 0; else headerSpacer" (click)="markAllAsRead()">
      Mark all read
    </button>
    <ng-template #headerSpacer>
      <div class="header-spacer" aria-hidden="true"></div>
    </ng-template>
  </header>

  <div class="notifications-list" *ngIf="!loading && notifications.length > 0; else emptyState">
    <div
      class="notification-card"
      *ngFor="let note of notifications"
      [class.notification-card--unread]="!note.read"
      (click)="markAsRead(note)"
    >
      <div class="note-indicator" *ngIf="!note.read"></div>
      <div class="note-content">
        <div class="note-message">{{ note.message }}</div>
        <div class="note-meta">
          <span class="note-type">{{ note.type }}</span>
          <span>{{ note.created_at | date:'short' }}</span>
        </div>
      </div>
    </div>
  </div>

  <ng-template #emptyState>
    <div class="empty-state">
      <p *ngIf="loading">Loading notifications...</p>
      <p *ngIf="!loading">{{ errorMessage || 'No notifications yet.' }}</p>
      <button class="retry-btn" *ngIf="!loading && errorMessage" (click)="retry()">Retry</button>
    </div>
  </ng-template>
  <app-bottom-nav [tabs]="PATIENT_TABS" activeTab="home"></app-bottom-nav>
</section>
